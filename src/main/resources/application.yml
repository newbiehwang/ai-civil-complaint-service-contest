spring:
  application:
    name: ai-civil-complaint-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/complaint}
    username: ${DB_USERNAME:complaint}
    password: ${DB_PASSWORD:complaint}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
server:
  port: 8080

complaint:
  neighbor-center:
    measurement-template-path: ${NEIGHBOR_CENTER_MEASUREMENT_TEMPLATE_PATH:/Users/hwangshincheol/Library/Mobile Documents/com~apple~CloudDocs/AI 기반 민원 서비스 혁신 시나리오/소음측정 신청서_관리주체가 없는 경우.hwpx}
    measurement-recipient-email: ${NEIGHBOR_CENTER_MEASUREMENT_RECIPIENT_EMAIL:schwang2001@gmail.com}
    measurement-mail-subject: ${NEIGHBOR_CENTER_MEASUREMENT_MAIL_SUBJECT:[정부24 데모] 층간소음 측정 신청서 제출}
    measurement-mail-from: ${NEIGHBOR_CENTER_MEASUREMENT_MAIL_FROM:}
    measurement-mail-enabled: ${NEIGHBOR_CENTER_MEASUREMENT_MAIL_ENABLED:false}
    measurement-output-dir: ${NEIGHBOR_CENTER_MEASUREMENT_OUTPUT_DIR:${java.io.tmpdir}/neighbor-center-submissions}
  mock-submission:
    auto-process-enabled: ${MOCK_SUBMISSION_AUTO_PROCESS_ENABLED:true}
    processing-delay-ms: ${MOCK_SUBMISSION_DELAY_MS:1500}
  institution-gateway:
    fail-direct-api: ${INSTITUTION_GATEWAY_FAIL_DIRECT_API:false}
  ai:
    followup:
      use-llm: ${AI_FOLLOWUP_USE_LLM:false}
      openai:
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        api-key: ${OPENAI_API_KEY:}
        model: ${OPENAI_MODEL:gpt-4o-mini}
        timeout-ms: ${OPENAI_TIMEOUT_MS:4000}
    chat:
      use-llm: ${AI_CHAT_USE_LLM:false}
      provider: ${AI_CHAT_PROVIDER:claude}
      claude:
        base-url: ${CLAUDE_BASE_URL:https://api.anthropic.com}
        api-key: ${CLAUDE_API_KEY:}
        model: ${CLAUDE_MODEL:claude-3-5-sonnet-latest}
        timeout-ms: ${CLAUDE_TIMEOUT_MS:30000}
        max-output-tokens: ${CLAUDE_MAX_OUTPUT_TOKENS:500}
  security:
    jwt-secret: ${JWT_SECRET:replace-with-at-least-32-char-jwt-secret}
