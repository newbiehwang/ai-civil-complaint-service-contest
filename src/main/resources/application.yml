spring:
  application:
    name: ai-civil-complaint-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/complaint}
    username: ${DB_USERNAME:complaint}
    password: ${DB_PASSWORD:complaint}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
server:
  port: 8080

complaint:
  mock-submission:
    auto-process-enabled: ${MOCK_SUBMISSION_AUTO_PROCESS_ENABLED:true}
    processing-delay-ms: ${MOCK_SUBMISSION_DELAY_MS:1500}
  security:
    jwt-secret: ${JWT_SECRET:replace-with-at-least-32-char-jwt-secret}
