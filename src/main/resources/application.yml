spring:
  application:
    name: ai-civil-complaint-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/complaint}
    username: ${DB_USERNAME:complaint}
    password: ${DB_PASSWORD:complaint}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
server:
  port: 8080

complaint:
  mock-submission:
    auto-process-enabled: ${MOCK_SUBMISSION_AUTO_PROCESS_ENABLED:true}
    processing-delay-ms: ${MOCK_SUBMISSION_DELAY_MS:1500}
  institution-gateway:
    fail-direct-api: ${INSTITUTION_GATEWAY_FAIL_DIRECT_API:false}
  ai:
    followup:
      use-llm: ${AI_FOLLOWUP_USE_LLM:false}
      openai:
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        api-key: ${OPENAI_API_KEY:}
        model: ${OPENAI_MODEL:gpt-4o-mini}
        timeout-ms: ${OPENAI_TIMEOUT_MS:4000}
  security:
    jwt-secret: ${JWT_SECRET:replace-with-at-least-32-char-jwt-secret}
