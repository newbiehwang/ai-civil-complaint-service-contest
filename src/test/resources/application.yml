spring:
  datasource:
    url: jdbc:h2:mem:complaint;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

complaint:
  mock-submission:
    auto-process-enabled: true
    processing-delay-ms: 50
  security:
    jwt-secret: test-jwt-secret-key-must-be-32chars
