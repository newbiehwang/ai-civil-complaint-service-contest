spring:
  datasource:
    url: jdbc:h2:mem:complaint;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true

complaint:
  neighbor-center:
    measurement-template-path: /tmp/neighbor-center-template.hwpx
    measurement-recipient-email: test-recipient@example.com
    measurement-mail-subject: "[테스트] 층간소음 측정 신청서 제출"
    measurement-mail-from: test-sender@example.com
    measurement-mail-enabled: false
    measurement-output-dir: /tmp/neighbor-center-submissions-test
  mock-submission:
    auto-process-enabled: true
    processing-delay-ms: 50
  institution-gateway:
    fail-direct-api: false
  ai:
    followup:
      use-llm: false
  security:
    jwt-secret: test-jwt-secret-key-must-be-32chars
